name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python3 -c "from annotation.cli import annotate_gene; print('OK')"

      - name: Dry run
        run: python3 main.py data/GeneSymbols_2.txt --dry-run
