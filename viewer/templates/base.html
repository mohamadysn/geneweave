<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GeneWeave{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --ok: #34d399;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { margin: 0; font-size: 1.6rem; }
    header p { margin: 4px 0 0; color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
      text-decoration: none;
    }
    .btn:hover { background: #7dd3fc; text-decoration: none; }
    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .card h2 { margin: 0 0 8px; font-size: 1.15rem; }
    .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 14px; }
    .stats {
      display: flex;
      gap: 16px;
      margin: 14px 0;
      flex-wrap: wrap;
    }
    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 90px;
    }
    .stat .value { font-size: 1.4rem; font-weight: 700; color: var(--ok); }
    .stat .label { font-size: 0.75rem; color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      background: var(--card);
      border-radius: 14px;
      border: 1px dashed var(--border);
    }
    .coverage-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .coverage-bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
